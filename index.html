<html lang="es" data-theme="dark">
<head>

<title>TrailixDB</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
[data-theme="dark"] {
  --bg:         #0d0d14;
  --bg2:        #13131e;
  --surface:    #1a1a2a;
  --surface2:   #22223a;
  --border:     #2e2e4a;
  --border2:    #3a3a5a;
  --text:       #e4e4f0;
  --text2:      #9090b8;
  --accent:     #7c6fff;
  --accent-bg:  rgba(124,111,255,.12);
  --green:      #3ddba6;
  --red:        #ff6b7a;
  --yellow:     #f5c842;
  --blue:       #5bc4f5;
  --shadow:     0 4px 24px rgba(0,0,0,.5);
  --pk-color:   #ff6b7a;
  --fk-color:   #f5c842;
  --null-color: #555580;
  --bool-t:     #3ddba6;
  --bool-f:     #ff6b7a;
}
[data-theme="light"] {
  --bg:         #f0f0f8;
  --bg2:        #e8e8f4;
  --surface:    #ffffff;
  --surface2:   #f5f5fe;
  --border:     #d8d8ec;
  --border2:    #c8c8e0;
  --text:       #1a1a30;
  --text2:      #6060a0;
  --accent:     #5b50e0;
  --accent-bg:  rgba(91,80,224,.08);
  --green:      #1aa87a;
  --red:        #e03050;
  --yellow:     #c49200;
  --blue:       #2095cc;
  --shadow:     0 4px 24px rgba(0,0,0,.12);
  --pk-color:   #e03050;
  --fk-color:   #c49200;
  --null-color: #b0b0cc;
  --bool-t:     #1aa87a;
  --bool-f:     #e03050;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-variant-ligatures: none; font-feature-settings: "liga" 0, "clig" 0, "dlig" 0; }
html, body { height: 100%; }
body {
  font-family: Consolas, 'Courier New', Courier, monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  transition: background .25s, color .25s;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 0;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  z-index: 10;
}
.logo {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-right: auto;
}
.logo em { color: var(--accent); font-style: normal; }

/* NAV PILLS */
.nav-pills { display: flex; gap: 4px; margin-right: 16px; }
.nav-pill {
  padding: 5px 14px;
  font-size: 11px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: none;
  color: var(--text2);
  cursor: pointer;
  font-family: Consolas, 'Courier New', Courier, monospace;
  transition: all .15s;
}
.nav-pill:hover { color: var(--text); background: var(--surface2); }
.nav-pill.active {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}

/* THEME TOGGLE */
.theme-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ══════════════════════════════════════
   SIDEBAR — only shown in DATA view
══════════════════════════════════════ */
.sidebar {
  width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 12px 0;
}
.sidebar-label {
  padding: 0 14px 8px;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
}
.tbl-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  color: var(--text2);
  font-family: Consolas, 'Courier New', Courier, monospace;
  font-size: 11.5px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  transition: all .12s;
}
.tbl-btn:hover { color: var(--text); background: var(--surface2); }
.tbl-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); }
.tbl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tbl-count {
  margin-left: auto;
  font-size: 9px;
  color: var(--text2);
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 10px;
}

/* ══════════════════════════════════════
   CONTENT PANEL
══════════════════════════════════════ */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* SQL BAR */
.sql-bar {
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.sql-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: Consolas, 'Courier New', Courier, monospace;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 7px;
  outline: none;
  transition: border .2s;
}
.sql-input:focus { border-color: var(--accent); }
.run-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 7px 16px;
  border-radius: 7px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.run-btn:hover { opacity: .88; transform: translateY(-1px); }
.run-btn:active { transform: translateY(0); }

/* SUGGESTIONS */
.sugs {
  padding: 7px 16px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sug {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  cursor: pointer;
  font-family: Consolas, 'Courier New', Courier, monospace;
  transition: all .12s;
}
.sug:hover { border-color: var(--accent); color: var(--accent); }

/* DATA TABLE */
.table-scroll { flex: 1; overflow: auto; padding: 16px; }
.grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.grid thead th {
  background: var(--surface2);
  color: var(--accent);
  padding: 9px 13px;
  text-align: left;
  font-weight: 500;
  border-bottom: 2px solid var(--accent);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 2;
}
.grid thead th .t { font-size: 9px; color: var(--text2); margin-left: 4px; font-weight: 400; }
.grid thead th .badge-pk { font-size: 8px; padding: 1px 4px; border-radius: 3px; background: rgba(255,107,122,.15); color: var(--pk-color); border: 1px solid var(--pk-color); margin-left: 3px; }
.grid thead th .badge-fk { font-size: 8px; padding: 1px 4px; border-radius: 3px; background: rgba(245,200,66,.12); color: var(--fk-color); border: 1px solid var(--fk-color); margin-left: 3px; }
.grid tbody td {
  padding: 7px 13px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  max-width: 240px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.grid tbody tr:hover td { background: var(--accent-bg); }
.v-null { color: var(--null-color); font-style: italic; }
.v-pk { color: var(--pk-color); font-weight: 700; }
.v-fk { color: var(--fk-color); }
.v-true { color: var(--bool-t); }
.v-false { color: var(--bool-f); }
.v-url { color: var(--blue); text-decoration: underline; cursor: pointer; max-width:180px; display:inline-block; overflow:hidden; text-overflow:ellipsis; }

/* STATUS BAR */
.statusbar {
  padding: 6px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 20px;
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
}
.statusbar span { color: var(--accent); }

/* ══════════════════════════════════════
   DIAGRAM VIEW (replaces Schema + ERD)
══════════════════════════════════════ */
.diagram-view {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.diagram-view.visible { display: flex; }
.diagram-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text2);
}
.diagram-toolbar button {
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 11px;
  cursor: pointer;
  font-family: Consolas, 'Courier New', Courier, monospace;
  transition: all .12s;
}
.diagram-toolbar button:hover { border-color: var(--accent); color: var(--accent); }
#diagramCanvas {
  flex: 1;
  cursor: grab;
  display: block;
}
#diagramCanvas.grabbing { cursor: grabbing; }

/* ══════════════════════════════════════
   DATA PANEL (hidden when schema/erd)
══════════════════════════════════════ */
.data-panel {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
</style>
</head>

<!-- TOPBAR -->

  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
</div>

<div class="workspace" id="workspace">

  <!-- SIDEBAR (data view only) -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- CONTENT -->
  <div class="content" id="content">

    <!-- DATA PANEL -->
    <div class="data-panel" id="dataPanel">
      <div class="sql-bar">
        <input class="sql-input" id="sqlInput" value="SELECT * FROM users" />
        <button class="run-btn" onclick="runQuery()">▶ Ejecutar</button>
      </div>
      <div class="sugs" id="sugs"></div>
      <div class="table-scroll">
        <table class="grid" id="grid"><thead></thead><tbody></tbody></table>
      </div>
      <div class="statusbar">
        <div>tabla: <span id="sTbl">–</span></div>
        <div>filas: <span id="sRows">–</span></div>
        <div>cols: <span id="sCols">–</span></div>
      </div>
    </div>

    <!-- DIAGRAM VIEW (Schema + ERD unified) -->
    <div class="diagram-view" id="diagramView">
      <div class="diagram-toolbar">
        <span>🔗 Diagrama de relaciones</span>
        <span style="margin-left:auto;font-size:10px">Arrastra las tablas · Scroll para zoom</span>
        <button onclick="resetDiagram()">↺ Reset</button>
        <button onclick="fitDiagram()">⊡ Fit</button>
      </div>
      <canvas id="diagramCanvas"></canvas>
    </div>

  </div>
</div>

      if (c.pk) return `<td class="v-pk">${v}</td>`;
      if (c.fk) return `<td class="v-fk">${v}</td>`;

        return `<td><a class="v-url" href="${v}" target="_blank">${v}</a></td>`;

    }).join('') + '</tr>'

// ════════════════════════════════
// SQL RUNNER
// ════════════════════════════════
function runQuery() {
  const raw = document.getElementById('sqlInput').value.trim().toLowerCase();
  const fm = raw.match(/from\s+(\w+)/);
  if (!fm) { alert('Falta cláusula FROM'); return; }
  const tbl = fm[1];
  if (!DB[tbl]) { alert(`Tabla "${tbl}" no existe`); return; }

  let rows = [...DB[tbl].rows];

  // WHERE (simple)
  const wm = raw.match(/where\s+(\w+)\s*(=|!=|>=|<=|>|<)\s*['"]?([^'"order\slimit]+?)['"]?(?:\s+order|\s+limit|$)/);
  if (wm) {
    const [,col,op,val] = wm;
    const v = val.trim();
    rows = rows.filter(r => {
      const rv = r[col];
      const svr = String(rv).toLowerCase();
      if (op==='=')  return svr===v || rv===true&&v==='true' || rv===false&&v==='false';
      if (op==='!=') return svr!==v;
      if (op==='>') return Number(rv) > Number(v);
      if (op==='<') return Number(rv) < Number(v);
      if (op==='>=') return Number(rv) >= Number(v);
      if (op==='<=') return Number(rv) <= Number(v);
    });
  }

  // ORDER BY
  const om = raw.match(/order by\s+(\w+)(\s+desc)?/);
  if (om) {
    const [,col,desc] = om;
    rows.sort((a,b) => {
      if (a[col] < b[col]) return desc ? 1 : -1;
      if (a[col] > b[col]) return desc ? -1 : 1;
      return 0;
    });
  }

  // LIMIT
  const lm = raw.match(/limit\s+(\d+)/);
  if (lm) rows = rows.slice(0, parseInt(lm[1]));

  curTable = tbl;
  buildSidebar();
  renderTable(tbl, rows);
  buildSugs(tbl);

  if (curView !== 'data') goView('data');
}

// Diagram state
let dPos = {}; // table positions (canvas coords)
let dScale = 1;
let dOffX = 0, dOffY = 0;
let dDragging = null; // { type:'table'|'pan', tbl, mx, my, ox, oy }
let dInited = false;
let dHighlight = null; // hovered table name

const COL_H = 22;
const HEAD_H = 30;
const TBL_W = 190;

function tblHeight(tbl) {
  return HEAD_H + DB[tbl].cols.length * COL_H + 6;
}

function initDiagram() {
  const canvas = document.getElementById('diagramCanvas');
  if (!dInited) {
    // copy layout
    TBLS.forEach(t => { dPos[t] = { ...LAYOUT[t] }; });
    dInited = true;
    attachDiagramEvents(canvas);
  }
  resizeCanvas();
  drawDiagram();
}

function resizeCanvas() {
  const canvas = document.getElementById('diagramCanvas');
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth;
  canvas.height = parent.clientHeight;
}

function getThemeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    bg:      s.getPropertyValue('--bg').trim()      || '#0d0d14',
    surface: s.getPropertyValue('--surface').trim() || '#1a1a2a',
    surface2:s.getPropertyValue('--surface2').trim()|| '#22223a',
    border:  s.getPropertyValue('--border').trim()  || '#2e2e4a',
    text:    s.getPropertyValue('--text').trim()     || '#e4e4f0',
    text2:   s.getPropertyValue('--text2').trim()    || '#9090b8',
    accent:  s.getPropertyValue('--accent').trim()   || '#7c6fff',
    pk:      s.getPropertyValue('--pk-color').trim() || '#ff6b7a',
    fk:      s.getPropertyValue('--fk-color').trim() || '#f5c842',
  };
}

function drawDiagram() {
  const canvas = document.getElementById('diagramCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const C = getThemeColors();

  ctx.clearRect(0, 0, W, H);

  // background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // dot grid
  ctx.fillStyle = dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)';
  const gs = 28 * dScale;
  const ox = ((dOffX % gs) + gs) % gs;
  const oy = ((dOffY % gs) + gs) % gs;
  for (let x = ox; x < W; x += gs)
    for (let y = oy; y < H; y += gs) {
      ctx.beginPath();
      ctx.arc(x, y, 1.2, 0, Math.PI*2);
      ctx.fill();
    }

  ctx.save();
  ctx.translate(dOffX, dOffY);
  ctx.scale(dScale, dScale);

  // Draw relations
  RELATIONS.forEach(rel => {
    drawRelation(ctx, rel, C);
  });

  // Draw tables
  TBLS.forEach(t => {
    drawTable(ctx, t, C);
  });

  ctx.restore();
}

function worldToCanvas(wx, wy) {
  return { x: wx * dScale + dOffX, y: wy * dScale + dOffY };
}

function colCenterY(tbl, colName) {
  const cols = DB[tbl].cols;
  const idx = cols.findIndex(c => c.n === colName);
  return dPos[tbl].y + HEAD_H + idx * COL_H + COL_H / 2 + 3;
}

function drawRelation(ctx, rel, C) {
  const fp = dPos[rel.from];
  const tp = dPos[rel.to];
  if (!fp || !tp) return;

  const fy = colCenterY(rel.from, rel.fromCol);
  const ty = colCenterY(rel.to, rel.toCol);

  // Determine which side to connect from/to
  const fcx = fp.x + TBL_W / 2;
  const tcx = tp.x + TBL_W / 2;

  let fx, tx2;
  if (fcx < tcx) {
    fx = fp.x + TBL_W; // right side of from
    tx2 = tp.x;         // left side of to
  } else {
    fx = fp.x;           // left side of from
    tx2 = tp.x + TBL_W; // right side of to
  }

  const isHighlighted = dHighlight === rel.from || dHighlight === rel.to;
  const relColor = isHighlighted ? C.accent : (dark ? 'rgba(124,111,255,0.35)' : 'rgba(91,80,224,0.25)');

  ctx.save();
  ctx.strokeStyle = relColor;
  ctx.lineWidth = isHighlighted ? 1.8 : 1.2;
  ctx.setLineDash(isHighlighted ? [] : [5, 4]);

  const cpOffset = Math.abs(fx - tx2) * 0.45 + 30;
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.bezierCurveTo(
    fx + (fcx < tcx ? cpOffset : -cpOffset), fy,
    tx2 + (fcx < tcx ? -cpOffset : cpOffset), ty,
    tx2, ty
  );
  ctx.stroke();

  // Arrow at destination
  ctx.setLineDash([]);
  ctx.fillStyle = relColor;
  const arrowDir = fcx < tcx ? -1 : 1;
  ctx.beginPath();
  ctx.moveTo(tx2, ty);
  ctx.lineTo(tx2 + arrowDir * 8, ty - 4);
  ctx.lineTo(tx2 + arrowDir * 8, ty + 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawTable(ctx, tbl, C) {
  const pos = dPos[tbl];
  const cols = DB[tbl].cols;
  const h = tblHeight(tbl);
  const color = CLR[tbl];
  const isHovered = dHighlight === tbl;

  ctx.save();

  // Shadow
  ctx.shadowColor = isHovered ? color + '66' : 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = isHovered ? 18 : 8;

  // Body background
  ctx.fillStyle = C.surface;
  roundRect(ctx, pos.x, pos.y, TBL_W, h, 8);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Border
  ctx.strokeStyle = isHovered ? color : C.border;
  ctx.lineWidth = isHovered ? 2 : 1;
  roundRect(ctx, pos.x, pos.y, TBL_W, h, 8);
  ctx.stroke();

  // Header
  ctx.fillStyle = color;
  roundRectTop(ctx, pos.x, pos.y, TBL_W, HEAD_H, 8);
  ctx.fill();

  // Header text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.fillText(tbl, pos.x + 10, pos.y + 19);

  // Row count badge
  const cnt = '' + DB[tbl].rows.length + ' rows';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '9px Consolas, monospace';
  ctx.textAlign = 'right';
  ctx.fillText(cnt, pos.x + TBL_W - 8, pos.y + 19);

  // Columns
  cols.forEach((col, i) => {
    const cy = pos.y + HEAD_H + i * COL_H;
    const isLast = i === cols.length - 1;

    // Row separator
    if (i > 0) {
      ctx.strokeStyle = C.border;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(pos.x + 1, cy);
      ctx.lineTo(pos.x + TBL_W - 1, cy);
      ctx.stroke();
    }

    // Row bg on hover alternating
    if (i % 2 === 0) {
      ctx.fillStyle = dark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.015)';
      ctx.fillRect(pos.x + 1, cy, TBL_W - 2, COL_H);
    }

    // Icon on left: small symbol for PK or FK
    ctx.font = '10px Consolas, monospace';
    ctx.textAlign = 'left';
    if (col.pk) {
      ctx.fillStyle = C.pk;
      ctx.fillText('PK', pos.x + 8, cy + 13);
    } else if (col.fk) {
      ctx.fillStyle = C.fk;
      ctx.fillText('FK', pos.x + 8, cy + 13);
    }

    // Col name — always starts at fixed offset, never overlaps badge
    const nameX = (col.pk || col.fk) ? pos.x + 34 : pos.x + 10;
    ctx.font = '11px Consolas, monospace';
    ctx.textAlign = 'left';
    if (col.pk) ctx.fillStyle = C.pk;
    else if (col.fk) ctx.fillStyle = C.fk;
    else ctx.fillStyle = C.text;
    ctx.fillText(col.n, nameX, cy + 14);

    // Type (right aligned)
    ctx.font = '10px Consolas, monospace';
    ctx.fillStyle = C.text2;
    ctx.textAlign = 'right';
    ctx.fillText(col.t, pos.x + TBL_W - 8, cy + 14);
  });

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function roundRectTop(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h);
  ctx.lineTo(x, y+h);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function canvasToWorld(cx, cy) {
  return { x: (cx - dOffX) / dScale, y: (cy - dOffY) / dScale };
}

function hitTable(wx, wy) {
  // reverse order so top tables get priority
  for (let i = TBLS.length-1; i >= 0; i--) {
    const t = TBLS[i];
    const p = dPos[t];
    if (wx >= p.x && wx <= p.x + TBL_W && wy >= p.y && wy <= p.y + tblHeight(t)) return t;
  }
  return null;
}

function attachDiagramEvents(canvas) {
  let panStart = null;

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const w = canvasToWorld(cx, cy);
    const hit = hitTable(w.x, w.y);

    if (hit) {
      dDragging = { type: 'table', tbl: hit, mx: cx, my: cy, ox: dPos[hit].x, oy: dPos[hit].y };
    } else {
      dDragging = { type: 'pan', mx: cx, my: cy, ox: dOffX, oy: dOffY };
    }
    canvas.classList.add('grabbing');
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;

    if (dDragging) {
      const dx = cx - dDragging.mx;
      const dy = cy - dDragging.my;
      if (dDragging.type === 'table') {
        dPos[dDragging.tbl].x = dDragging.ox + dx / dScale;
        dPos[dDragging.tbl].y = dDragging.oy + dy / dScale;
      } else {
        dOffX = dDragging.ox + dx;
        dOffY = dDragging.oy + dy;
      }
      drawDiagram();
    } else {
      const w = canvasToWorld(cx, cy);
      const hit = hitTable(w.x, w.y);
      if (hit !== dHighlight) { dHighlight = hit; drawDiagram(); }
    }
  });

  canvas.addEventListener('mouseup', () => {
    dDragging = null;
    canvas.classList.remove('grabbing');
  });

  canvas.addEventListener('mouseleave', () => {
    dDragging = null;
    canvas.classList.remove('grabbing');
    dHighlight = null;
    drawDiagram();
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.11;
    const newScale = Math.min(Math.max(dScale * delta, 0.25), 3);
    dOffX = cx - (cx - dOffX) * (newScale / dScale);
    dOffY = cy - (cy - dOffY) * (newScale / dScale);
    dScale = newScale;
    drawDiagram();
  }, { passive: false });

  window.addEventListener('resize', () => {
    if (curView === 'diagram') { resizeCanvas(); drawDiagram(); }
  });
}

function fitDiagram() {
  const canvas = document.getElementById('diagramCanvas');
  if (!canvas) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  TBLS.forEach(t => {
    const p = dPos[t];
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + TBL_W);
    maxY = Math.max(maxY, p.y + tblHeight(t));
  });
  const pad = 40;
  const W = canvas.width, H = canvas.height;
  const scaleX = (W - pad*2) / (maxX - minX);
  const scaleY = (H - pad*2) / (maxY - minY);
  dScale = Math.min(scaleX, scaleY, 1.2);
  dOffX = pad - minX * dScale;
  dOffY = pad - minY * dScale;
  drawDiagram();
}

function resetDiagram() {
  TBLS.forEach(t => { dPos[t] = { ...LAYOUT[t] }; });
  dScale = 1; dOffX = 40; dOffY = 20;
  drawDiagram();
}

// ════════════════════════════════
// THEME
// ════════════════════════════════
let dark = true;
function toggleTheme() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
}

// ENTER key
document.getElementById('sqlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runQuery();
});

// ════════════════════════════════
// INIT
// ════════════════════════════════
buildSidebar();
renderTable(curTable, DB[curTable].rows);
buildSugs(curTable);
</script>
